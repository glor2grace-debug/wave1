<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전기회로 AC Master - CBT 학습</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #app {
            width: 100%;
            max-width: 600px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .status-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: #34495e;
            color: white;
            font-size: 0.9em;
        }
        .screen {
            padding: 20px;
            flex-grow: 1;
            display: none;
        }
        .screen.active {
            display: block;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn-main { background: var(--accent); color: white; }
        .choice-btn {
            background: white;
            border: 2px solid var(--primary);
            text-align: left;
        }
        .choice-btn:hover { background: #f0f0f0; }
        .correct { background: var(--success) !important; color: white; }
        .wrong { background: var(--danger) !important; color: white; }
        
        .progress-container {
            width: 100%;
            background: #ddd;
            height: 10px;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--success);
            transition: 0.3s;
        }
        .concept-card {
            background: #fff8ef;
            padding: 15px;
            border-left: 5px solid var(--accent);
            margin-bottom: 10px;
        }
        .badge-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .badge {
            background: #f1c40f;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1>⚡ 전기회로 CBT</h1>
        <p>V. 교류 회로의 기초</p>
    </header>

    <div class="status-bar">
        <span>LV. <span id="lv">1</span></span>
        <span>EXP: <span id="exp">0</span></span>
        <span>콤보: <span id="combo">0</span></span>
    </div>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <!-- 메인 화면 -->
    <div id="home-screen" class="screen active">
        <div class="concept-card">
            <h3>오늘의 핵심 공식</h3>
            <p>실횻값(V) = 최댓값(Vm) / √2</p>
        </div>
        <button class="btn btn-main" onclick="startQuiz()">학습 시작하기 (CBT)</button>
        <button class="btn" style="background:#95a5a6; color:white;" onclick="showConcepts()">핵심 개념 요약</button>
    </div>

    <!-- 개념 요약 화면 -->
    <div id="concept-screen" class="screen">
        <h2>핵심 요약 카드</h2>
        <div id="concept-list"></div>
        <button class="btn btn-main" onclick="goHome()">메인으로</button>
    </div>

    <!-- 퀴즈 화면 -->
    <div id="quiz-screen" class="screen">
        <div id="question-text" style="font-weight:bold; font-size:1.1em; margin-bottom:20px;"></div>
        <div id="choices-container"></div>
        <div id="explanation" style="margin-top:20px; display:none; padding:15px; background:#e8f8f5; border-radius:8px;"></div>
        <button id="next-btn" class="btn btn-main" style="display:none;" onclick="nextQuestion()">다음 문제</button>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="screen text-center" style="text-align: center;">
        <h2>학습 완료!</h2>
        <p style="font-size: 2em;">점수: <span id="score">0</span>점</p>
        <div class="badge-container" id="badges" style="justify-content: center;"></div>
        <button class="btn btn-main" onclick="goHome()">다시 학습하기</button>
    </div>
</div>

<script>
    // 문제 데이터 (확장 가능)
    const questions = [
        { id: 1, question: "주파수의 단위로 옳은 것은?", choices: ["Volt [V]", "Ampere [A]", "Hertz [Hz]", "Ohm [Ω]", "Watt [W]"], answer: 2, exp: "주파수의 단위는 Hz(헤르츠)입니다." },
        { id: 2, question: "사인파 교류의 실횻값은 최댓값의 몇 배인가?", choices: ["1배", "2배", "1/√2배", "√2배", "π/2배"], answer: 2, exp: "실횻값 = 최댓값 / √2 입니다." },
        { id: 3, question: "교류 전원의 크기와 방향이 1초 동안 반복되는 횟수는?", choices: ["주기", "위상", "주파수", "실효치", "평균치"], answer: 2, exp: "1초간 반복 횟수는 주파수(Frequency)입니다." },
        { id: 4, question: "사인파 교류의 평균값 공식으로 옳은 것은?", choices: ["Vm", "Vm/√2", "2Vm/π", "Vm/π", "√2Vm"], answer: 2, exp: "평균값은 최댓값의 2/π 배(약 63.7%)입니다." },
        { id: 5, question: "오실로스코프에서 파형의 시작점을 맞추는 기능은?", choices: ["Focus", "Intensity", "Trigger", "Position", "Volt/Div"], answer: 2, exp: "Trigger(트리거)는 파형의 시작점을 동기화하여 화면을 정지시킵니다." }
    ];

    const concepts = [
        "직류(DC): 시간의 흐름에 따라 크기와 방향이 일정함",
        "교류(AC): 시간의 흐름에 따라 크기와 방향이 주기적으로 변화함",
        "주기(T): 1회 반복되는 데 걸리는 시간(초)",
        "실횻값: 교류가 직류와 동일한 에너지를 소비할 때의 값 (가정용 220V)"
    ];

    let currentIdx = 0;
    let score = 0;
    let combo = 0;
    let exp = 0;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goHome() {
        currentIdx = 0;
        score = 0;
        combo = 0;
        updateUI();
        showScreen('home-screen');
    }

    function showConcepts() {
        const list = document.getElementById('concept-list');
        list.innerHTML = concepts.map(c => `<div class="concept-card">${c}</div>`).join('');
        showScreen('concept-screen');
    }

    function startQuiz() {
        currentIdx = 0;
        score = 0;
        showQuestion();
        showScreen('quiz-screen');
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question-text').innerText = `${currentIdx + 1}. ${q.question}`;
        const container = document.getElementById('choices-container');
        container.innerHTML = '';
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        q.choices.forEach((c, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn choice-btn';
            btn.innerText = c;
            btn.onclick = () => checkAnswer(i);
            container.appendChild(btn);
        });
        
        updateProgressBar();
    }

    function checkAnswer(idx) {
        const q = questions[currentIdx];
        const btns = document.querySelectorAll('.choice-btn');
        
        if(idx === q.answer) {
            btns[idx].classList.add('correct');
            score += 20;
            combo++;
            exp += 10;
            alert("정답입니다! ⚡ +" + (combo * 10) + " EXP");
        } else {
            btns[idx].classList.add('wrong');
            btns[q.answer].classList.add('correct');
            combo = 0;
            alert("아쉬워요! 정답을 확인해보세요.");
        }

        document.getElementById('explanation').innerText = "💡 해설: " + q.exp;
        document.getElementById('explanation').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
        
        // 버튼 비활성화
        btns.forEach(b => b.disabled = true);
        updateUI();
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('score').innerText = score;
        const badges = document.getElementById('badges');
        badges.innerHTML = '';
        if(score >= 80) badges.innerHTML += '<span class="badge">🏆 교류 마스터</span>';
        if(combo >= 3) badges.innerHTML += '<span class="badge">🔥 콤보 왕</span>';
        showScreen('result-screen');
    }

    function updateUI() {
        document.getElementById('lv').innerText = Math.floor(exp / 100) + 1;
        document.getElementById('exp').innerText = exp % 100;
        document.getElementById('combo').innerText = combo;
    }

    function updateProgressBar() {
        const progress = ((currentIdx) / questions.length) * 100;
        document.getElementById('progress-bar').style.width = progress + '%';
    }
</script>

</body>
</html>
